<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROJGAR.SITE | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --accent: #f59e0b;
            --text: #f1f5f9;
            --dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo h1 { font-size: 24px; color: var(--text); }
        .logo span { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 24px; border-radius: 12px; border: 1px solid #334155; }
        .stat-card h3 { color: var(--dim); font-size: 14px; margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .val { font-size: 32px; font-weight: 700; color: var(--accent); }

        .control-panel { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 40px; }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 14px 28px; 
            border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; 
            gap: 10px; transition: all 0.2s; font-size: 16px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .btn:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        .terminal { 
            background: #000; color: #00ff00; font-family: 'Courier New', monospace; 
            padding: 20px; border-radius: 12px; height: 300px; overflow-y: auto; 
            margin-top: 20px; font-size: 13px; white-space: pre-wrap; border: 1px solid #334155;
        }

        .job-list { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        .job-item { padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .job-item:last-child { border: none; }
        .job-info h4 { font-size: 15px; margin-bottom: 4px; }
        .job-info p { font-size: 12px; color: var(--dim); }
        .job-source { background: #475569; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><h1>ROJGAR<span>.SITE</span> Admin</h1></div>
        <div class="status" id="server-status"><i class="fas fa-circle" style="color:var(--success)"></i> Server Online</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Jobs</h3>
            <div class="val" id="total-jobs">0</div>
        </div>
        <div class="stat-card">
            <h3>Year Range</h3>
            <div class="val">2025+</div>
        </div>
        <div class="stat-card">
            <h3>Sources</h3>
            <div class="val">3</div>
        </div>
    </div>

    <div class="control-panel">
        <h2 style="margin-bottom:20px">Automation Center</h2>
        <p style="color:var(--dim); margin-bottom:20px">Starting a sync will crawl all 3 sources, filter for 2025+ posts, and generate high-fidelity job pages automatically.</p>
        <button id="sync-btn" class="btn"><i class="fas fa-sync"></i> Start Global Sync</button>
        
        <div id="log-terminal" class="terminal">Welcome to the Admin Shell. Waiting for action...</div>
    </div>

    <h2 style="margin-bottom:20px">Recent Scraped Jobs</h2>
    <div class="job-list" id="job-list">
        <!-- Jobs appear here -->
    </div>
</div>

<script>
    const syncBtn = document.getElementById('sync-btn');
    const terminal = document.getElementById('log-terminal');
    const totalJobs = document.getElementById('total-jobs');
    const jobList = document.getElementById('job-list');

    async function loadStats() {
        const res = await fetch('/api/jobs');
        const jobs = await res.json();
        totalJobs.innerText = jobs.length;
        
        jobList.innerHTML = jobs.slice(0, 10).map(job => `
            <div class="job-item">
                <div class="job-info">
                    <h4>${job.title}</h4>
                    <p>Scraped at: ${new Date(job.scraped_at).toLocaleString()}</p>
                </div>
                <div class="job-source">${job.source}</div>
            </div>
        `).join('');
    }

    syncBtn.onclick = async () => {
        syncBtn.disabled = true;
        terminal.innerText = '🌀 Connecting to scraping engine...\n';
        
        const response = await fetch('/api/sync', { method: 'POST' });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const text = decoder.decode(value);
            terminal.innerText += text;
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        syncBtn.disabled = false;
        loadStats();
    };

    loadStats();
</script>

</body>
</html>
